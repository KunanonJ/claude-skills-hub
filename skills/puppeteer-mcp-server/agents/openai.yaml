name: puppeteer-mcp-server
description: Local Codex guidance for using merajmehrabi/puppeteer-mcp-server safely.
version: 1.0.0
source: https://github.com/merajmehrabi/puppeteer-mcp-server
package: puppeteer-mcp-server@0.7.2
capabilities:
  - browser-navigation
  - screenshots
  - form-interaction
  - active-chrome-tab-control
  - javascript-evaluation
safety:
  browser_state: user-visible
  active_tab_mode: explicit-user-intent-required
  javascript_evaluation: high-risk-on-sensitive-pages
  remote_debugging: local-only
