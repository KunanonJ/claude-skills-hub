# HypoGeniC config.yaml template
#
# This matches the real schema used by the `hypogenic` package
# (https://github.com/ChicagoHAI/hypothesis-generation). The top-level keys are:
#   task_name, train_data_path, val_data_path, test_data_path, prompt_templates
#
# IMPORTANT details that trip people up:
#   - Placeholders use ${...} substitution (e.g. ${headline_1}, ${num_hypotheses}),
#     NOT {var}. Feature placeholders must match the *_features keys in your JSON
#     (text_features_1, text_features_2, ... — or your custom names).
#   - Each prompt template is split by role (system / user). The first role is the
#     system message, the second is the user message.
#   - Keys under prompt_templates that are NOT one of the known templates below are
#     treated as reusable "extra keys": you can reference them as ${EXTRA_KEY} inside
#     other templates (here `observations` is reused inside batched_generation).
#   - Model, API key, Redis port, generation epochs, etc. are passed as CLI flags to
#     `hypogenic_generation` / `hypogenic_inference` (run with --help), or as
#     arguments in the examples/*.py scripts. They do NOT live in this file.

task_name: headline_binary

train_data_path: ./headline_binary_train.json
val_data_path: ./headline_binary_val.json
test_data_path: ./headline_binary_test.json

prompt_templates:
  # --- Reusable extra key: one formatted observation, reused below as ${observations}
  observations: |
    Headline 1: ${headline_1}
    Headline 2: ${headline_2}
    Observation: ${label}

  # --- Required: batched hypothesis generation
  batched_generation:
    system: |
      You are a social media expert. Given a pair of headlines, you predict which
      one received more clicks. We will give you a set of observations, and you must
      propose ${num_hypotheses} possible, generalizable hypotheses that help predict
      which headline gets more clicks. Each hypothesis should be a one-sentence,
      testable statement.
    user: |
      Here are the observations:
      ${observations}

      Generate ${num_hypotheses} distinct hypotheses. Number them and keep each to a
      single sentence.

  # --- Optional: few-shot baseline (no generated hypotheses, just demonstrations)
  few_shot_baseline:
    system: |
      You are a social media expert. Given a pair of headlines, predict which one
      received more clicks. Give your final answer in the format "Final answer: ...".
    user: |
      ${observations}
      Which headline got more clicks: Headline 1 or Headline 2?

  # --- Required for inference: apply ONE hypothesis to a new example
  inference:
    system: |
      You are a social media expert. Use the given hypothesis to predict which
      headline received more clicks. End with "Final answer: Headline 1" or
      "Final answer: Headline 2".
    user: |
      Hypothesis: ${hypothesis}

      Headline 1: ${headline_1}
      Headline 2: ${headline_2}

      Which headline got more clicks? Give your reasoning, then the final answer.

  # --- Optional: relevance filter used during generation/refinement
  is_relevant:
    system: |
      You decide whether a hypothesis is relevant to predicting headline clicks.
      Answer only "yes" or "no".
    user: |
      Hypothesis: ${hypothesis}
      Headline 1: ${headline_1}
      Headline 2: ${headline_2}
      Is this hypothesis relevant to this example?

  # --- Optional: adaptive inference (selects/uses multiple hypotheses)
  adaptive_inference:
    system: |
      You are a social media expert. Multiple hypotheses are provided. Weigh them and
      predict which headline received more clicks. End with "Final answer: ...".
    user: |
      Hypotheses:
      ${hypotheses}

      Headline 1: ${headline_1}
      Headline 2: ${headline_2}

  # --- Optional: adaptive selection (pick the best hypotheses for an example)
  adaptive_selection:
    system: |
      Given several hypotheses and an example, select the hypotheses most useful for
      predicting which headline received more clicks.
    user: |
      Hypotheses:
      ${hypotheses}

      Headline 1: ${headline_1}
      Headline 2: ${headline_2}
