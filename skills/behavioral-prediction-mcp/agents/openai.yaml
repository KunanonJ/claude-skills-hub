interface:
  display_name: "ChainAware Behavioral Prediction"
  short_description: "AI-powered fraud detection, wallet behavior analysis, rug pull prediction, and token ranking for Web3 — across 8 blockchains, 14M+ wallets."
  icon_small: "./assets/logo-small.png"
  icon_large: "./assets/logo-large.png"
  brand_color: "#0066FF"
  default_prompt: "Analyze this wallet address for fraud risk on Ethereum"

policy:
  # Allow Codex to invoke this skill automatically when wallet addresses,
  # fraud risk, rug pull, DeFi personalization, or token ranking topics are detected.
  allow_implicit_invocation: true

capabilities:
  - id: predictive_fraud
    display_name: "Wallet Fraud Detection"
    description: >
      Predicts fraudulent wallet behavior before it happens (~98% accuracy on ETH)
      and performs AML/Anti-Money-Laundering checks. Returns fraud probability (0–1),
      status (Fraud / Not Fraud / New Address), and forensic breakdown.
    networks: [ETH, BNB, POLYGON, TON, BASE, TRON, HAQQ]
    inputs:
      - name: walletAddress
        type: string
        required: true
      - name: network
        type: string
        required: true

  - id: predictive_behaviour
    display_name: "Wallet Behavioral Analysis"
    description: >
      Profiles a wallet's on-chain history, intent, experience level, risk tolerance,
      protocol usage, and category segments (DeFi, NFT, Bridge, Yield). Returns
      next-best-action predictions and personalised recommendations.
    networks: [ETH, BNB, BASE, HAQQ, SOLANA]
    inputs:
      - name: walletAddress
        type: string
        required: true
      - name: network
        type: string
        required: true

  - id: predictive_rug_pull
    display_name: "Smart Contract Rug Pull Detection"
    description: >
      Forecasts whether a liquidity pool or smart contract is likely to rug pull.
      Returns risk probability, risk tier, deployer risk score, and forensic flags.
    networks: [ETH, BNB, BASE, HAQQ]
    inputs:
      - name: walletAddress
        type: string
        required: true
        description: "Smart contract or LP address to evaluate"
      - name: network
        type: string
        required: true

  - id: credit_score
    display_name: "Crypto Credit Score"
    description: >
      Calculates a crypto credit/trust score (1–9) for a wallet by combining fraud
      probability with social graph analysis. Designed for DeFi lending protocols
      that need a fast, single-number creditworthiness signal per wallet.
      1 = highest credit risk, 9 = highest creditworthiness.
    networks: [ETH]
    inputs:
      - name: walletAddress
        type: string
        required: true
      - name: network
        type: string
        required: true

  - id: token_rank_list
    display_name: "Token Rank List"
    description: >
      Ranks tokens by the strength of their holder community. Supports search,
      filter by category (AI Token, RWA Token, DeFi Token, DeFAI Token, DePIN Token),
      sort, and pagination.
    networks: [ETH, BNB, BASE, SOLANA]
    inputs:
      - name: limit
        type: string
        required: true
      - name: offset
        type: string
        required: true
      - name: network
        type: string
        required: false
      - name: sort_by
        type: string
        required: false
      - name: sort_order
        type: string
        required: false
      - name: category
        type: string
        required: false
      - name: contract_name
        type: string
        required: false

  - id: token_rank_single
    display_name: "Token Rank Single"
    description: >
      Returns the community rank and top holders for a specific token contract address,
      including each holder's global wallet rank, balance, age, and transaction count.
    networks: [ETH, BNB, BASE, SOLANA]
    inputs:
      - name: contract_address
        type: string
        required: true
      - name: network
        type: string
        required: true

subagents:
  - id: chainaware-wallet-auditor
    display_name: "Wallet Auditor"
    description: "Full due diligence — deep behavioural analysis including fraud signals, intent, experience, and recommendations."
    model: claude-sonnet-4-6
    tools: [predictive_behaviour]
    file: .claude/agents/chainaware-wallet-auditor.md

  - id: chainaware-fraud-detector
    display_name: "Fraud Detector"
    description: "Fast wallet fraud screening. Returns status, probability (0–1), and forensic AML flags."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud]
    file: .claude/agents/chainaware-fraud-detector.md

  - id: chainaware-rug-pull-detector
    display_name: "Rug Pull Detector"
    description: "Smart contract and LP safety checks. Returns rug pull risk tier and deployer risk."
    model: claude-haiku-4-5-20251001
    tools: [predictive_rug_pull, predictive_fraud]
    file: .claude/agents/chainaware-rug-pull-detector.md

  - id: chainaware-wallet-marketer
    display_name: "Wallet Marketer"
    description: "Generates a personalised marketing message (≤20 words) calibrated to the wallet's behaviour profile."
    model: claude-sonnet-4-6
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-wallet-marketer.md

  - id: chainaware-reputation-scorer
    display_name: "Reputation Scorer"
    description: "Calculates a reputation score (0–1000) using the ChainAware formula."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour]
    file: .claude/agents/chainaware-reputation-scorer.md

  - id: chainaware-aml-scorer
    display_name: "AML Scorer"
    description: "AML compliance score (0–100) for KYC and regulatory workflows. Returns 0 if forensic flags present."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud]
    file: .claude/agents/chainaware-aml-scorer.md

  - id: chainaware-trust-scorer
    display_name: "Trust Scorer"
    description: "Simple trust score (0.00–1.00) calculated as 1 - fraud_probability."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud]
    file: .claude/agents/chainaware-trust-scorer.md

  - id: chainaware-wallet-ranker
    display_name: "Wallet Ranker"
    description: "Returns a wallet's global experience rank and leaderboard position."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour]
    file: .claude/agents/chainaware-wallet-ranker.md

  - id: chainaware-token-ranker
    display_name: "Token Ranker"
    description: "Discovers and ranks tokens by holder community strength across chains and categories."
    model: claude-haiku-4-5-20251001
    tools: [token_rank_list]
    file: .claude/agents/chainaware-token-ranker.md

  - id: chainaware-token-analyzer
    display_name: "Token Analyzer"
    description: "Deep-dive into a single token: community rank, top holders, global rank, and holder fraud screening."
    model: claude-haiku-4-5-20251001
    tools: [token_rank_single, predictive_fraud]
    file: .claude/agents/chainaware-token-analyzer.md

  - id: chainaware-onboarding-router
    display_name: "Onboarding Router"
    description: "Routes wallets to Beginner / Intermediate / Power User / Skip onboarding based on experience level."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-onboarding-router.md

  - id: chainaware-whale-detector
    display_name: "Whale Detector"
    description: "Classifies wallets into Mega Whale / Whale / Emerging Whale / Not a Whale tiers."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-whale-detector.md

  - id: chainaware-defi-advisor
    display_name: "DeFi Advisor"
    description: "Personalised DeFi product recommendations by experience tier and risk appetite."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-defi-advisor.md

  - id: chainaware-airdrop-screener
    display_name: "Airdrop Screener"
    description: "Batch screens wallets for airdrop eligibility; filters bots and fraud; ranks by reputation score."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud, predictive_behaviour]
    file: .claude/agents/chainaware-airdrop-screener.md

  - id: chainaware-lending-risk-assessor
    display_name: "Lending Risk Assessor"
    description: "Borrower risk grade (A–F), recommended collateral ratio, and interest rate tier for DeFi lending."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud, predictive_behaviour, credit_score]
    file: .claude/agents/chainaware-lending-risk-assessor.md

  - id: chainaware-token-launch-auditor
    display_name: "Token Launch Auditor"
    description: "Pre-listing launch safety audit — composite score, APPROVED / CONDITIONAL / REJECTED verdict."
    model: claude-haiku-4-5-20251001
    tools: [predictive_rug_pull, predictive_fraud, predictive_behaviour]
    file: .claude/agents/chainaware-token-launch-auditor.md

  - id: chainaware-agent-screener
    display_name: "AI Agent Screener"
    description: "Screens an AI agent's operational wallet and feeder wallet. Returns Agent Trust Score 0–10."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud, predictive_behaviour]
    file: .claude/agents/chainaware-agent-screener.md

  - id: chainaware-cohort-analyzer
    display_name: "Cohort Analyzer"
    description: "Segments a batch of wallets into behavioural cohorts with per-cohort engagement strategies."
    model: claude-sonnet-4-6
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-cohort-analyzer.md

  - id: chainaware-counterparty-screener
    display_name: "Counterparty Screener"
    description: "Real-time pre-transaction go/no-go verdict (Safe / Caution / Block) before trading or sending."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud, predictive_behaviour]
    file: .claude/agents/chainaware-counterparty-screener.md

  - id: chainaware-governance-screener
    display_name: "Governance Screener"
    description: "DAO voter Sybil detection, governance tier classification, and voting weight multiplier calculation."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-governance-screener.md

  - id: chainaware-sybil-detector
    display_name: "Sybil Detector"
    description: "Bulk Sybil attack detection for DAO governance votes. Screens a voter list for coordinated fraud, wallet farms, and low-quality participation. Classifies each wallet as ELIGIBLE, REVIEW, or EXCLUDE, detects cross-wallet Sybil patterns, and produces reputation-weighted vote multipliers."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-sybil-detector.md

  - id: chainaware-platform-greeter
    display_name: "Platform Greeter"
    description: "Contextual welcome message for a specific wallet on a specific platform — same wallet gets a different message on Aave vs 1inch vs OpenSea."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-platform-greeter.md

  - id: chainaware-upsell-advisor
    display_name: "Upsell Advisor"
    description: "Upsell path for existing users — upgrade readiness score, next product recommendation, trigger event, and ready-to-use upsell message."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-upsell-advisor.md

  - id: chainaware-lead-scorer
    display_name: "Lead Scorer"
    description: "Sales lead qualification — lead score (0–100), tier (Hot/Warm/Cold/Dead), conversion probability, and recommended outreach angle."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-lead-scorer.md

  - id: chainaware-transaction-monitor
    display_name: "Transaction Monitor"
    description: "Real-time transaction risk scoring for autonomous agents — composite score (0–100) and pipeline action (ALLOW / FLAG / HOLD / BLOCK)."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud, predictive_rug_pull, predictive_behaviour]
    file: .claude/agents/chainaware-transaction-monitor.md

  - id: chainaware-marketing-director
    display_name: "Marketing Director"
    description: "Full-cycle campaign orchestrator — segments audience, scores leads, detects whales, builds per-cohort message playbook, surfaces upsell opportunities, and routes new wallets."
    model: claude-sonnet-4-6
    tools: [Agent, predictive_fraud]
    file: .claude/agents/chainaware-marketing-director.md

  - id: chainaware-compliance-screener
    display_name: "Compliance Screener"
    description: "First-layer MiCA-aligned compliance screening — orchestrates fraud, AML, transaction, and counterparty checks into a Compliance Report with PASS / EDD / REJECT verdict (~70–75% MiCA coverage for pure DeFi)."
    model: claude-haiku-4-5-20251001
    tools: [Agent, predictive_fraud]
    file: .claude/agents/chainaware-compliance-screener.md

  - id: chainaware-gamefi-screener
    display_name: "GameFi Screener"
    description: "Web3 game and P2E wallet screening — detects bot farms, cheaters, and farm wallets; classifies legitimate players into experience tiers for matchmaking; outputs P2E reward eligibility and multiplier."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud, predictive_behaviour]
    file: .claude/agents/chainaware-gamefi-screener.md

  - id: chainaware-portfolio-risk-advisor
    display_name: "Portfolio Risk Advisor"
    description: "Portfolio-level rug pull and community health assessment — scans every token, produces weighted Portfolio Risk Score, grade (A–F), concentration flags, and prioritised rebalancing plan."
    model: claude-sonnet-4-6
    tools: [predictive_rug_pull, token_rank_single]
    file: .claude/agents/chainaware-portfolio-risk-advisor.md

  - id: chainaware-rwa-investor-screener
    display_name: "RWA Investor Screener"
    description: "RWA investor suitability screening — assesses fraud risk, on-chain experience, and risk profile alignment against the RWA tier; returns QUALIFIED / CONDITIONAL / REFER_TO_KYC / DISQUALIFIED with recommended investment cap."
    model: claude-haiku-4-5-20251001
    tools: [predictive_fraud, predictive_behaviour]
    file: .claude/agents/chainaware-rwa-investor-screener.md

  - id: chainaware-credit-scorer
    display_name: "Credit Scorer"
    description: "Returns a crypto credit score (1–9) for any wallet combining fraud probability and social graph analysis. Fast, single-number creditworthiness signal for lending and trust decisions."
    model: claude-haiku-4-5-20251001
    tools: [credit_score]
    file: .claude/agents/chainaware-credit-scorer.md

  - id: chainaware-ltv-estimator
    display_name: "LTV Estimator"
    description: "Estimates 12-month lifetime value (LTV) as a USD revenue range using behavioral signals — experience, activity categories, risk profile, forward-looking intent, and fraud-based retention probability."
    model: claude-haiku-4-5-20251001
    tools: [predictive_behaviour, predictive_fraud]
    file: .claude/agents/chainaware-ltv-estimator.md

dependencies:
  tools:
    - type: "mcp"
      value: "chainaware-behavioral-prediction"
      description: "ChainAware Behavioral Prediction MCP — real-time fraud detection, wallet behavioral profiling, rug pull risk scoring, and token ranking via SSE."
      transport: "sse"
      url: "https://prediction.mcp.chainaware.ai/sse"

metadata:
