name: Deploy Tank Skill
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version increment
        id: version
        run: |
          current_version="$(jq -r .version tank.json)"
          previous_version="$(git show '${{ github.event.before }}:tank.json' 2>/dev/null | jq -r .version 2>/dev/null || true)"
          CURRENT_VERSION="$current_version" PREVIOUS_VERSION="$previous_version" node <<'NODE' >> "$GITHUB_OUTPUT"
          const parseVersion = (version) => version.split(".").map(Number);
          const compareVersions = (left, right) => parseVersion(left).reduce(
            (result, part, index) => result || Math.sign(part - parseVersion(right)[index]),
            0,
          );
          const { CURRENT_VERSION: current, PREVIOUS_VERSION: previous } = process.env;
          console.log(`changed=${previous ? compareVersions(current, previous) > 0 : "true"}`);
          NODE
      - name: Install Tank CLI
        if: steps.version.outputs.changed == 'true'
        run: sudo curl -fsSL https://raw.githubusercontent.com/tankpkg/tank/main/install.sh | sudo sh
      - name: Publish to Tank Registry
        if: steps.version.outputs.changed == 'true'
        env:
          TANK_TOKEN: ${{ secrets.TANK_TOKEN }}
        run: tank publish
